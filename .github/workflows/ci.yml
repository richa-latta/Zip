name: Zip CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:

  checkstyle:
    name: Checkstyle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run Checkstyle
        run: mvn checkstyle:check
      - name: Step Summary
        if: always()
        run: |
          echo "## Checkstyle (Linting)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ No style violations found." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Style violations detected — see logs for details." >> $GITHUB_STEP_SUMMARY
          fi

  compile:
    name: Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Compile
        run: mvn clean compile
      - name: Step Summary
        if: always()
        run: |
          echo "## Compile" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Compiled successfully with Java 17." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Compilation failed — see logs for errors." >> $GITHUB_STEP_SUMMARY
          fi

  spotbugs:
    name: SpotBugs
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run SpotBugs
        run: mvn clean compile spotbugs:check
      - name: Step Summary
        if: always()
        run: |
          echo "## SpotBugs (Static Analysis)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ No bugs found." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Bugs detected — download the \`spotbugs-report\` artifact for details." >> $GITHUB_STEP_SUMMARY
          fi
      - name: Upload SpotBugs Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: target/spotbugsXml.xml
          retention-days: 30
          if-no-files-found: ignore

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: compile
    outputs:
      total:   ${{ steps.counts.outputs.total }}
      passed:  ${{ steps.counts.outputs.passed }}
      failed:  ${{ steps.counts.outputs.failed }}
      skipped: ${{ steps.counts.outputs.skipped }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run Unit Tests
        run: mvn test
      - name: Parse Test Results
        id: counts
        if: always()
        run: |
          python3 - <<'EOF'
          import glob, xml.etree.ElementTree as ET, os
          total = errors = failures = skipped = 0
          for f in glob.glob('target/surefire-reports/TEST-*.xml'):
              r = ET.parse(f).getroot()
              total    += int(r.get('tests',    0))
              errors   += int(r.get('errors',   0))
              failures += int(r.get('failures', 0))
              skipped  += int(r.get('skipped',  0))
          passed = total - errors - failures - skipped
          out = os.environ['GITHUB_OUTPUT']
          with open(out, 'a') as f:
              f.write(f'total={total}\n')
              f.write(f'passed={passed}\n')
              f.write(f'failed={errors+failures}\n')
              f.write(f'skipped={skipped}\n')
          EOF
      - name: Step Summary
        if: always()
        run: |
          TOTAL="${{ steps.counts.outputs.total }}"
          PASSED="${{ steps.counts.outputs.passed }}"
          FAILED="${{ steps.counts.outputs.failed }}"
          SKIPPED="${{ steps.counts.outputs.skipped }}"
          echo "## Unit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Total | ✅ Passed | ❌ Failed | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|----------|----------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| ${TOTAL} | ${PASSED} | ${FAILED} | ${SKIPPED} |" >> $GITHUB_STEP_SUMMARY
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 30

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    outputs:
      line_pct:   ${{ steps.jacoco.outputs.line_pct }}
      branch_pct: ${{ steps.jacoco.outputs.branch_pct }}
      method_pct: ${{ steps.jacoco.outputs.method_pct }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Generate & Check Coverage
        run: mvn verify -Dspotbugs.skip=true
      - name: Parse Coverage Report
        id: jacoco
        if: always()
        run: |
          awk -F',' '
            NR>1 {
              lm+=$8;  lc+=$9;
              bm+=$6;  bc+=$7;
              mm+=$12; mc+=$13
            }
            END {
              lt=lc+lm; bt=bc+bm; mt=mc+mm
              lp = lt>0 ? lc/lt*100 : 0
              bp = bt>0 ? bc/bt*100 : 0
              mp = mt>0 ? mc/mt*100 : 0
              printf "line_pct=%.1f\n",   lp
              printf "branch_pct=%.1f\n", bp
              printf "method_pct=%.1f\n", mp
            }
          ' target/site/jacoco/jacoco.csv >> $GITHUB_OUTPUT
      - name: Step Summary
        if: always()
        run: |
          LINE="${{ steps.jacoco.outputs.line_pct }}"
          BRANCH="${{ steps.jacoco.outputs.branch_pct }}"
          METHOD="${{ steps.jacoco.outputs.method_pct }}"
          echo "## Code Coverage (JaCoCo)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Coverage | Minimum |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lines    | **${LINE}%**   | 80% |" >> $GITHUB_STEP_SUMMARY
          echo "| Branches | **${BRANCH}%** | —   |" >> $GITHUB_STEP_SUMMARY
          echo "| Methods  | **${METHOD}%** | —   |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Download the \`jacoco-coverage-report\` artifact for the full HTML report._" >> $GITHUB_STEP_SUMMARY
      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 30

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
      - name: Step Summary
        if: always()
        run: |
          echo "## Dependency Review" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ No high/critical vulnerabilities in dependency changes." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Vulnerable dependencies detected — see PR comment for details." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Uses GitHub Advisory Database. Threshold: High severity._" >> $GITHUB_STEP_SUMMARY

  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [compile, test, coverage]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Analyse with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn verify sonar:sonar \
            -Dsonar.projectKey=richa-latta_Zip \
            -Dspotbugs.skip=true
      - name: Step Summary
        if: always()
        run: |
          echo "## SonarCloud Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Analysis complete — [view results on SonarCloud](https://sonarcloud.io/project/overview?id=richa-latta_Zip)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Analysis failed — ensure \`SONAR_TOKEN\` secret is configured." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Setup:** [sonarcloud.io](https://sonarcloud.io) → Import from GitHub → Add \`SONAR_TOKEN\` secret." >> $GITHUB_STEP_SUMMARY
          fi
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [checkstyle, spotbugs, coverage, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Package JAR
        run: mvn package -DskipTests
      - name: Step Summary
        if: always()
        run: |
          echo "## Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ JAR packaged successfully — download the \`application-jar\` artifact." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Build failed — see logs for details." >> $GITHUB_STEP_SUMMARY
          fi
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/*.jar
          retention-days: 30

  report:
    name: Report
    runs-on: ubuntu-latest
    needs: [checkstyle, spotbugs, test, coverage, dependency-review, sonar]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Update PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- zip-ci-report -->';
            const results = {
              checkstyle: '${{ needs.checkstyle.result }}',
              spotbugs:   '${{ needs.spotbugs.result }}',
              test:       '${{ needs.test.result }}',
              coverage:   '${{ needs.coverage.result }}',
              depReview:  '${{ needs.dependency-review.result }}',
              sonar:      '${{ needs.sonar.result }}',
            };
            const cov = {
              line:   '${{ needs.coverage.outputs.line_pct }}',
              branch: '${{ needs.coverage.outputs.branch_pct }}',
              method: '${{ needs.coverage.outputs.method_pct }}',
            };
            const counts = {
              total:   '${{ needs.test.outputs.total }}',
              passed:  '${{ needs.test.outputs.passed }}',
              failed:  '${{ needs.test.outputs.failed }}',
              skipped: '${{ needs.test.outputs.skipped }}',
            };
            const icon = (r) => r === 'success' ? '✅ Passed' : r === 'skipped' ? '⏭️ Skipped' : '❌ Failed';
            const bar  = (v) => {
              const n = parseFloat(v) || 0;
              const filled = Math.round(n / 10);
              return '`' + '█'.repeat(filled) + '░'.repeat(10 - filled) + ` ${n}%` + '`';
            };
            const overall = ['checkstyle','spotbugs','test','coverage','depReview']
              .every(k => results[k] === 'success');
            const body = [
              marker,
              `## ${overall ? '✅' : '❌'} CI Pipeline Results`,
              '',
              '| Check | Result |',
              '|-------|--------|',
              `| Checkstyle        | ${icon(results.checkstyle)} |`,
              `| SpotBugs          | ${icon(results.spotbugs)}   |`,
              `| Unit Tests        | ${icon(results.test)}       |`,
              `| Coverage          | ${icon(results.coverage)}   |`,
              `| Dependency Review | ${icon(results.depReview)}   |`,
              `| SonarCloud        | ${icon(results.sonar)}      |`,
              '',
              '### 🧪 Test Results',
              '',
              `| Total | ✅ Passed | ❌ Failed | ⏭️ Skipped |`,
              `|-------|----------|----------|-----------|`,
              `| ${counts.total} | ${counts.passed} | ${counts.failed} | ${counts.skipped} |`,
              '',
              '### 📊 Code Coverage',
              '',
              '| Metric | Coverage |',
              '|--------|----------|',
              `| Lines    | ${bar(cov.line)}   |`,
              `| Branches | ${bar(cov.branch)} |`,
              `| Methods  | ${bar(cov.method)} |`,
              '',
              '_Download artifacts: Coverage Report · Test Results · OWASP Report · JAR_',
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.data.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [checkstyle, compile, spotbugs, test, coverage, sonar, build]
    if: failure()
    steps:
      - name: Send notification
        run: |
          echo "CI Pipeline failed! This would trigger notifications to:"
          echo "- Email to team members"
          echo "- Slack channel #qa-automation"
          echo "- GitHub PR comment"
          echo "- JIRA ticket updates"
          echo ""
          echo "In production, this would use:"
          echo "  - actions/slack-notify"
          echo "  - sendgrid/github-action"
          echo "  - atlassian/gajira-create"
